name: Update repository traffic

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  update-traffic:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update README traffic table
        uses: actions/github-script@v7
        env:
          REPOSITORY: ${{ github.repository }}
        with:
          # If the default token cannot read traffic, add a repository secret named
          # TRAFFIC_TOKEN with repository Administration: read permission.
          github-token: ${{ secrets.TRAFFIC_TOKEN || github.token }}
          script: |
            const fs = require("fs");
            const path = "README.md";
            const [owner, repo] = process.env.REPOSITORY.split("/");

            const { data } = await github.request("GET /repos/{owner}/{repo}/traffic/views", {
              owner,
              repo,
              per: "day",
              headers: {
                "X-GitHub-Api-Version": "2022-11-28"
              }
            });

            const updatedAt = new Date().toISOString().replace("T", " ").replace(/\.\d{3}Z$/, " UTC");
            const next = [
              "<!-- TRAFFIC:START -->",
              "| Metric | Value |",
              "| --- | ---: |",
              `| Unique visitors, last 14 days | ${data.uniques} |`,
              `| Page views, last 14 days | ${data.count} |`,
              `| Last updated | ${updatedAt} |`,
              "<!-- TRAFFIC:END -->"
            ].join("\n");

            const readme = fs.readFileSync(path, "utf8");
            const replaced = readme.replace(
              /<!-- TRAFFIC:START -->[\s\S]*?<!-- TRAFFIC:END -->/,
              next
            );

            if (readme === replaced) {
              core.info("README traffic table is already up to date.");
              return;
            }

            fs.writeFileSync(path, replaced);

      - name: Commit README update
        run: |
          if git diff --quiet -- README.md; then
            echo "No README traffic changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore: update repository traffic"
          git push
